        join:
          joinCondition: |-
            FROM {{ ref('DATA','DIM_EVENTS_REGION')}} "DIM_EVENTS_REGION"
            JOIN {{ ref('STAGE', 'VW_PRICE_COST_REGION') }} "VW_PRICE_COST_REGION"
            ON "DIM_EVENTS_REGION"."ZONE_GEOGRAPHY" = VW_PRICE_COST_REGION."ZONE_GEOGRAPHY"
            AND "DIM_EVENTS_REGION"."PRODKEY" = "VW_PRICE_COST_REGION"."PRODKEY"
            AND CASE WHEN "DIM_EVENTS_REGION"."END_DATE" > CURRENT_DATE 
                  THEN CURRENT_DATE 
                  ELSE "DIM_EVENTS_REGION"."END_DATE" 
               END  BETWEEN "VW_PRICE_COST_REGION"."PC_DT" AND "VW_PRICE_COST_REGION"."PC_DT_END"
             WHERE "DIM_EVENTS_REGION"."EVENT_TYPE" LIKE 'BASE%'
               AND DATEDIFF(DAY, "DIM_EVENTS_REGION"."EFFECTIVE_DATE", 
                     CASE WHEN "DIM_EVENTS_REGION"."END_DATE" > CURRENT_DATE 
                        THEN CURRENT_DATE 
                        ELSE "DIM_EVENTS_REGION"."END_DATE" 
                     END )+1 >= 21
               QUALIFY 1 = ROW_NUMBER() OVER (PARTITION BY "DIM_EVENTS_REGION"."ZONE_GEOGRAPHY", "DIM_EVENTS_REGION".PRODKEY ORDER BY "DIM_EVENTS_REGION".EFFECTIVE_DATE DESC)
