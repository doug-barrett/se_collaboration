        join:
          joinCondition: |+
            FROM {{ ref('STAGE', 'VW_PRODUCT_ACTIVE') }} "VW_PRODUCT_ACTIVE"
            JOIN {{ ref('DATA', 'DIM_PRODUCT') }} DIM_PRODUCT
            ON VW_PRODUCT_ACTIVE.PRODKEY = DIM_PRODUCT.PRODKEY
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_YEAR_SUMMARY') }} VW_MEASURES_YEAR_SUMMARY
            ON VW_PRODUCT_ACTIVE."ZONE_GEOGRAPHY" = VW_MEASURES_YEAR_SUMMARY."ZONE_GEOGRAPHY"
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_YEAR_SUMMARY."PRODKEY"
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_YEAR_SUMMARY_PG') }} VW_MEASURES_YEAR_SUMMARY_PG
            ON VW_PRODUCT_ACTIVE."ZONE_GEOGRAPHY" = VW_MEASURES_YEAR_SUMMARY_PG."ZONE_GEOGRAPHY"
            AND DIM_PRODUCT.LEVEL4_DESC = VW_MEASURES_YEAR_SUMMARY_PG.LEVEL4_DESC
            LEFT JOIN {{ref('DATA','DIM_EVENTS_REGION') }} "DIM_EVENTS_REGION"
            ON "VW_PRODUCT_ACTIVE"."ZONE_GEOGRAPHY" = "DIM_EVENTS_REGION"."ZONE_GEOGRAPHY"
            AND "VW_PRODUCT_ACTIVE".PRODKEY = "DIM_EVENTS_REGION"."PRODKEY"
            AND CURRENT_DATE BETWEEN "DIM_EVENTS_REGION"."EFFECTIVE_DATE" AND "DIM_EVENTS_REGION"."END_DATE"
            LEFT JOIN (SELECT * 
                       FROM {{ref('DATASTORE','DS_FORECAST')}} 
                       WHERE CURRENT_DATE BETWEEN "START_DATE" AND "END_DATE"
                       QUALIFY 1 = ROW_NUMBER() OVER (PARTITION BY "ZONE_GEOGRAPHY", "PRODKEY" 
                                           ORDER BY "FORECAST_KEY")) "DS_FORECAST"
            ON "VW_PRODUCT_ACTIVE"."ZONE_GEOGRAPHY" = "DS_FORECAST"."ZONE_GEOGRAPHY"
            AND "VW_PRODUCT_ACTIVE".PRODKEY = "DS_FORECAST"."PRODKEY"
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_ALL_SUMMARY') }} VW_MEASURES_ALL_SUMMARY
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_ALL_SUMMARY.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_ALL_SUMMARY.PRODKEY
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_M6_SUMMARY') }} VW_MEASURES_M6_SUMMARY
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_M6_SUMMARY.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_M6_SUMMARY.PRODKEY
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_QTR_SUMMARY') }} VW_MEASURES_QTR_SUMMARY
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_QTR_SUMMARY.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_QTR_SUMMARY.PRODKEY
            LEFT JOIN {{ ref('STAGE', 'VW_PRICE_COST_REGION') }} VW_PRICE_COST_REGION_CURRENT
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_PRICE_COST_REGION_CURRENT.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_PRICE_COST_REGION_CURRENT.PRODKEY
            AND CURRENT_DATE BETWEEN VW_PRICE_COST_REGION_CURRENT.PC_DT AND VW_PRICE_COST_REGION_CURRENT.PC_DT_END
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_BASE') }} VW_MEASURES_BASE
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_BASE.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_BASE.PRODKEY
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_BASE_FNR_DAY') }} VW_MEASURES_BASE_FNR_DAY
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_BASE_FNR_DAY.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_BASE_FNR_DAY.PRODKEY
            LEFT JOIN {{ ref('STAGE', 'VW_PRICE_COST_REGION') }} VW_PRICE_COST_REGION
            ON VW_MEASURES_BASE.ZONE_GEOGRAPHY = VW_PRICE_COST_REGION.ZONE_GEOGRAPHY
            AND VW_MEASURES_BASE.PRODKEY = VW_PRICE_COST_REGION.PRODKEY
            AND VW_MEASURES_BASE.BASE_END_DATE BETWEEN VW_PRICE_COST_REGION.PC_DT AND VW_PRICE_COST_REGION.PC_DT_END
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_MAX_VOL') }} VW_MEASURES_MAX_VOL
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_MAX_VOL.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_MAX_VOL.PRODKEY
            LEFT JOIN  {{ ref('STAGE', 'VW_MEASURES_BRAND_VIEW') }} VW_MEASURES_BRAND_VIEW
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_BRAND_VIEW.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_BRAND_VIEW.PRODKEY
            LEFT JOIN  {{ ref('STAGE', 'VW_MEASURES_BRAND_VIEW_6MTH') }} VW_MEASURES_BRAND_VIEW_6MTH
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_BRAND_VIEW_6MTH.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_BRAND_VIEW_6MTH.PRODKEY
            LEFT JOIN  {{ ref('STAGE', 'VW_MEASURES_BRAND_VIEW_ALL') }} VW_MEASURES_BRAND_VIEW_ALL
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_BRAND_VIEW_ALL.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_BRAND_VIEW_ALL.PRODKEY
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_INVENTORY_STORE') }} VW_MEASURES_INVENTORY_STORE
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_INVENTORY_STORE.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_INVENTORY_STORE.PRODKEY
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_INVENTORY_DC') }} VW_MEASURES_INVENTORY_DC
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_INVENTORY_DC.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_INVENTORY_DC.PRODKEY
            LEFT JOIN {{ ref('STAGE', 'VW_MEASURES_INVENTORY_WGT') }} VW_MEASURES_INVENTORY_WGT
            ON VW_PRODUCT_ACTIVE.ZONE_GEOGRAPHY = VW_MEASURES_INVENTORY_WGT.ZONE_GEOGRAPHY
            AND VW_PRODUCT_ACTIVE.PRODKEY = VW_MEASURES_INVENTORY_WGT.PRODKEY

