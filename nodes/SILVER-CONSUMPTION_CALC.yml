        join:
          joinCondition: |-
            FROM {{ ref('SILVER', 'STG_ORDERS_LINEITEM') }} T1
            INNER JOIN {{ ref('GOLD', 'DIM_MENU_ITEM') }} T2 ON 
                REPLACE(UPPER(T1.ITEM_NAME_RAW), '_', ' ') = UPPER(T2.ITEM_NAME)
            INNER JOIN {{ ref('GOLD', 'DIM_FRANCHISE_LOCATIONS') }} T3 ON 
                T1.PICKUP_LOCATION = T3.LOCATION_NAME
            INNER JOIN {{ ref('SILVER', 'STG_RECIPE_NORMALIZED_T') }} T5 ON 
                T2.ITEM_ID = T5.ITEM_ID
                AND T1.PICKUP_DATE BETWEEN TO_DATE(T5.SYSTEM_START_DATE) AND TO_DATE(T5.SYSTEM_END_DATE)
            WHERE T1.ORDERED_QTY > 0
