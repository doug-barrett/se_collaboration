        join:
          joinCondition: |-
            FROM {{ ref('SILVER', 'BASE_ORDER_LOOKUP') }} B
            INNER JOIN {{ ref('GOLD', 'DIM_MENU_PRICES') }} P
                ON B.ITEM_ID = P.ITEM_ID 
                AND B.FRANCHISE_LOCATION_ID = P.FRANCHISE_LOCATION_ID
