    sourceMapping:
      - aliases:
          VW_DATE_FIN_WEEK: 732ca70b-49a5-4fd4-bff5-a4f8b0b0866e
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: DATA
            nodeName: DIM_DATE
          - locationName: DATA
            nodeName: FCT_SALES
          - locationName: STAGE
            nodeName: VW_DATE_FIN_WEEK
        join:
          joinCondition: |
            FROM (  SELECT DISTINCT ZONE_GEOGRAPHY, PRODKEY 
                    FROM {{ ref('DATA', 'FCT_SALES') }}
                    WHERE TRANSACTION_DATE > DATEADD(YEAR, -1, CURRENT_DATE)) "FCT_SALES"
            CROSS JOIN {{ ref('STAGE', 'VW_DATE_FIN_WEEK') }} VW_DATE_FIN_WEEK
            JOIN         
                    (SELECT FINANCIAL_YEAR, LAG(FINANCIAL_YEAR, 1) OVER (ORDER BY FINANCIAL_YEAR) PREV_YEAR 
                     FROM (SELECT DISTINCT FINANCIAL_YEAR FROM {{ ref('DATA', 'DIM_DATE')}})) PYEAR
              ON    "VW_DATE_FIN_WEEK"."FINANCIAL_YEAR" = PYEAR.FINANCIAL_YEAR
            WHERE "VW_DATE_FIN_WEEK"."MIN_DATE" BETWEEN  DATEADD(YEAR, -2, CURRENT_DATE) AND  DATEADD(YEAR, 1, CURRENT_DATE) 
        name: STG_PROD_ZONE_WEEK
