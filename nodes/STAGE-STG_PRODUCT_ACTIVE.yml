        dependencies:
          - locationName: DATA
            nodeName: FCT_PRICE_ELASTICITY_RAW
          - locationName: DATASTORE
            nodeName: DS_PRODUCT
          - locationName: DATASTORE
            nodeName: DS_TLOG
        join:
          joinCondition: |-
            FROM (  SELECT PRODKEY, MAX(SYSTEM_UPDATE_TIME) SYSTEM_UPDATE_TIME 
                    FROM {{ ref('DATASTORE', 'DS_PRODUCT') }} 
                    GROUP BY PRODKEY) "DS_PRODUCT"
            LEFT JOIN (
                SELECT PRODKEY, MAX(START_DATE) START_DATE 
                FROM {{ ref('DATA', 'FCT_PRICE_ELASTICITY_RAW') }} 
                WHERE ZONE_GEOGRAPHY = 'UK' AND START_DATE > DATEADD(MONTH, -12, CURRENT_DATE) 
                GROUP BY PRODKEY) "FCT_PRICE_ELASTICITY_RAW"
            ON "DS_PRODUCT"."PRODKEY" = "FCT_PRICE_ELASTICITY_RAW"."PRODKEY"
            LEFT JOIN (
                SELECT PRODKEY, MAX(TRANSACTION_DATE) TRANSACTION_DATE 
                FROM {{ ref('DATASTORE', 'DS_TLOG') }} "DS_TLOG" 
                WHERE "TRANSACTION_DATE" > DATEADD(MONTH, -12, CURRENT_DATE)  
                GROUP BY PRODKEY) DS_TLOG
            ON "DS_PRODUCT"."PRODKEY" = "DS_TLOG"."PRODKEY"
            WHERE "FCT_PRICE_ELASTICITY_RAW"."PRODKEY" IS NOT NULL
            OR "DS_TLOG"."PRODKEY" IS NOT NULL
            OR "DS_PRODUCT"."SYSTEM_UPDATE_TIME" > DATEADD(MONTH, -6, CURRENT_DATE)
