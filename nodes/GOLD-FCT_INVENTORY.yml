        join:
          joinCondition: |-
            FROM {{ ref('SILVER', 'STG_FINAL_COMPONENTS') }} FC
            LEFT JOIN {{ ref('SILVER', 'TRF_CONSUMPTION_DAILY') }} D
                ON FC.DATE_KEY = D.CONSUMPTION_DATE
                AND FC.FRANCHISE_LOCATION_ID = D.FRANCHISE_LOCATION_ID
                AND FC.INGREDIENT_SKU = D.INGREDIENT_SKU
            LEFT JOIN {{ ref('GOLD', 'FCT_RAW_INVENTORY_STOCK') }} R
                ON FC.DATE_KEY = R.DATE_KEY
                AND FC.FRANCHISE_LOCATION_ID = R.FRANCHISE_LOCATION_ID
                AND FC.INGREDIENT_SKU = R.INGREDIENT_SKU
            WHERE FC.ENDING_STOCK_QTY IS NOT NULL
