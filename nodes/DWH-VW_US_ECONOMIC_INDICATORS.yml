        join:
          joinCondition: |-
            FROM {{ ref('DWH', 'VW_FIBO_CLASSES') }} C
            LEFT JOIN {{ ref('DWH', 'VW_FIBO_INDIVIDUALS') }} I 
                ON I.INSTANCE_OF_CLASS LIKE '%' || C.CLASS_NAME || '%'
            LEFT JOIN {{ ref('DWH', 'VW_FIBO_RELATIONSHIPS') }} R 
                ON R.SOURCE_URI = C.CLASS_URI OR R.SOURCE_URI = I.INDIVIDUAL_URI
            WHERE C.CLASS_URI LIKE '%USEconomicIndicators%'
                OR I.INDIVIDUAL_URI LIKE '%USEconomicIndicators%'
