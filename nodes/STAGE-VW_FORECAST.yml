        join:
          joinCondition: |-
            FROM {{ ref('STAGE', 'VW_FORECAST_RAW') }} "EVENT_INPUT"
            JOIN {{ ref('DATA', 'DIM_DATE') }} DIM_DATE
            ON DIM_DATE."CALENDAR_DATE" = MID_DATE
            LEFT JOIN {{ ref_no_link('STAGE', 'STG_MEASURES_CURRENT_OPTIMIZE') }} "STG_MEASURES_CURRENT_OPTIMIZE"
            ON "EVENT_INPUT"."ZONE" = STG_MEASURES_CURRENT_OPTIMIZE."ZONE_GEOGRAPHY"
            AND "EVENT_INPUT"."SKU" = "STG_MEASURES_CURRENT_OPTIMIZE"."PRODKEY"
            AND DISCOUNT_BUCKET_CALC = "STG_MEASURES_CURRENT_OPTIMIZE".DISCOUNT_BUCKET
            AND UPPER(NVL(DIM_DATE."HOLIDAY_NAME", 'NO_HOLIDAY')) = UPPER("STG_MEASURES_CURRENT_OPTIMIZE".HOLIDAY_NAME)
            QUALIFY 
                  1 = ROW_NUMBER() OVER (PARTITION BY  NVL("EVENT_INPUT"."ZONE",'UK'),RIGHT('000000'||"EVENT_INPUT"."SKU", 6),"EVENT_INPUT"."START_DATE" ORDER BY  "EVENT_INPUT"."UPDATED_AT" DESC)
