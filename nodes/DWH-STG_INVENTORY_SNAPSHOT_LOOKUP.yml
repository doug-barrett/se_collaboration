        join:
          joinCondition: |-
            FROM
                {{ ref('DWH', 'STG_CURRENT_STOCK_BALANCES') }} "STG_CURRENT_STOCK_BALANCES"

            /* 1. Look up the Product Surrogate Key */
            LEFT JOIN
                {{ ref('DWH', 'DIM_PRODUCT_MASTER') }} "DIM_PRODUCT_MASTER"
                ON "STG_CURRENT_STOCK_BALANCES"."CLIENT" = "DIM_PRODUCT_MASTER"."CLIENT"
               AND "STG_CURRENT_STOCK_BALANCES"."MATERIAL_NUMBER" = "DIM_PRODUCT_MASTER"."PRODUCT_ID"

            /* 2. Look up the Location Surrogate Key */
            LEFT JOIN
                {{ ref('DWH', 'DIM_STORAGE_LOCATIONS') }} "DIM_STORAGE_LOCATIONS"
                ON "STG_CURRENT_STOCK_BALANCES"."CLIENT" = "DIM_STORAGE_LOCATIONS"."CLIENT"
               AND "STG_CURRENT_STOCK_BALANCES"."PLANT" = "DIM_STORAGE_LOCATIONS"."PLANT"
               AND "STG_CURRENT_STOCK_BALANCES"."STORAGE_LOCATION" = "DIM_STORAGE_LOCATIONS"."STORAGE_LOCATION"
