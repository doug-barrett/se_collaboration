            transform: |-
              CASE 
                WHEN (UNITS_PER_DAY + PRIOR_UNITS_PER_DAY) = 0 THEN 0
                WHEN (PRICE + PRIOR_PRICE) = 0 THEN 0
                WHEN (PRICE - PRIOR_PRICE) = 0 THEN 0 
              ELSE
                (((UNITS_PER_DAY - PRIOR_UNITS_PER_DAY) / (UNITS_PER_DAY + PRIOR_UNITS_PER_DAY) / 2)
                /
                ((PRICE - PRIOR_PRICE) / (PRICE + PRIOR_PRICE) / 2 ))
