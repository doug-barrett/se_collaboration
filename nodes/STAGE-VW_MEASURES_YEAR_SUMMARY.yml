    sourceMapping:
      - aliases:
          DIM_DATE: 2d9f453e-f432-4a19-a605-81709e23d574
          DIM_EVENTS_REGION: b4585615-226c-470e-8e85-be95816a6df2
          FCT_SALES_DAY: 91c3542a-c2f9-472c-8706-d613acb63e06
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: DATA
            nodeName: DIM_DATE
          - locationName: DATA
            nodeName: DIM_EVENTS_REGION
          - locationName: DATA
            nodeName: FCT_SALES_DAY
        join:
          joinCondition: |-
            FROM  {{ ref('DATA', 'DIM_DATE') }} "DIM_DATE"
            CROSS JOIN (SELECT DISTINCT ZONE_GEOGRAPHY, PRODKEY 
                        FROM {{ ref('DATA', 'FCT_SALES_DAY') }} 
                        WHERE TRANSACTION_DATE BETWEEN DATEADD(YEAR, -1, CURRENT_DATE) AND CURRENT_DATE) ZPROD
            LEFT JOIN {{ ref('DATA', 'FCT_SALES_DAY') }} "FCT_SALES_DAY"
            ON "DIM_DATE"."CALENDAR_DATE" = "FCT_SALES_DAY"."TRANSACTION_DATE"
            AND ZPROD.ZONE_GEOGRAPHY = FCT_SALES_DAY.ZONE_GEOGRAPHY
            AND ZPROD.PRODKEY = FCT_SALES_DAY.PRODKEY
            LEFT JOIN {{ ref('DATA', 'DIM_EVENTS_REGION') }} "DIM_EVENTS_REGION"
            ON ZPROD.ZONE_GEOGRAPHY = "DIM_EVENTS_REGION".ZONE_GEOGRAPHY
            AND ZPROD.PRODKEY = DIM_EVENTS_REGION.PRODKEY
            AND DIM_DATE.CALENDAR_DATE BETWEEN DIM_EVENTS_REGION.EFFECTIVE_DATE AND DIM_EVENTS_REGION.END_DATE
            WHERE "DIM_DATE"."CALENDAR_DATE" BETWEEN DATEADD(YEAR, -1, CURRENT_DATE) AND CURRENT_DATE
            GROUP BY "ZPROD"."ZONE_GEOGRAPHY", "ZPROD"."PRODKEY"
