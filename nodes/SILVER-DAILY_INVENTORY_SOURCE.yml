          P: 5789a6b5-50da-4ae0-a76a-10fa8dc28413
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: GOLD
            nodeName: FCT_RAW_INVENTORY_STOCK
          - locationName: SILVER
            nodeName: TRF_CONSUMPTION_DAILY
        join:
          joinCondition: |-
            FROM {{ ref('GOLD', 'FCT_RAW_INVENTORY_STOCK') }} "FCT_RAW_INVENTORY_STOCK"

            LEFT JOIN 
                        {{ ref_no_link('GOLD', 'FCT_INVENTORY') }} P ON
                        P.DATE_KEY = DATEADD(day, -1, "FCT_RAW_INVENTORY_STOCK"."DATE_KEY") AND -- Look up prior day's date
                        "FCT_RAW_INVENTORY_STOCK"."FRANCHISE_LOCATION_ID" = P.FRANCHISE_LOCATION_ID AND
                        "FCT_RAW_INVENTORY_STOCK"."INGREDIENT_SKU" = P.INGREDIENT_SKU

            -- Join to Daily Consumption (Demand)
                    LEFT JOIN 
                        {{ ref('SILVER', 'TRF_CONSUMPTION_DAILY') }} C ON
                        "FCT_RAW_INVENTORY_STOCK"."DATE_KEY" = C.CONSUMPTION_DATE AND
                        "FCT_RAW_INVENTORY_STOCK"."FRANCHISE_LOCATION_ID" = C.FRANCHISE_LOCATION_ID AND
                        "FCT_RAW_INVENTORY_STOCK".INGREDIENT_SKU = C.INGREDIENT_SKU
                        
                    -- Filter to process only the current date being run incrementally
                    WHERE "FCT_RAW_INVENTORY_STOCK"."DATE_KEY" = '2025-11-02' -- Replace with your dynamic variable
        name: DAILY_INVENTORY_SOURCE
        noLinkRefs:
          - locationName: GOLD
            nodeName: FCT_INVENTORY
