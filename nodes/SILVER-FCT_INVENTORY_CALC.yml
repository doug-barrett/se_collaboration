        customSQL:
          customSQL: |-
            {{ stage('Override Create SQL') }}
            CREATE OR REPLACE VIEW {{ ref('SILVER', 'FCT_INVENTORY_CALC') }} AS
            	WITH 

            -- 1. DATE_GRID: Generates a sequential list of all dates in the range
            DATE_GRID AS (
                SELECT DATEADD(day, SEQ4(), '2025-11-01'::DATE) AS DATE_KEY
                FROM TABLE(GENERATOR(ROWCOUNT => 63)) 
            ),

            -- 2. DAILY_EVENTS (Source Events): Calculates net supply/demand for all recorded events (Logic remains the same)
            DAILY_EVENTS AS (
                -- Net Change = (Initial + Received) - Consumed for all known event dates
                SELECT
                    R.DATE_KEY,
                    R.FRANCHISE_LOCATION_ID,
                    R.INGREDIENT_SKU,
                    (COALESCE(R.INITIAL_STOCK_QTY, 0) + COALESCE(R.RECEIVED_QTY, 0) - COALESCE(C.TOTAL_DAILY_CONSUMED_QTY, 0)) AS NET_CHANGE
                FROM {{ ref('GOLD', 'FCT_RAW_INVENTORY_STOCK') }} R
                LEFT JOIN "JJ_DEV"."JJ_DEMO_SILVER"."TRF_CONSUMPTION_DAILY" C
                    ON R.DATE_KEY = C.CONSUMPTION_DATE AND R.FRANCHISE_LOCATION_ID = C.FRANCHISE_LOCATION_ID AND R.INGREDIENT_SKU = C.INGREDIENT_SKU
                UNION
                -- Add consumption events that might not have a stock record (net change is negative)
                SELECT
                    C.CONSUMPTION_DATE AS DATE_KEY, C.FRANCHISE_LOCATION_ID, C.INGREDIENT_SKU,
                    (-1 * C.TOTAL_DAILY_CONSUMED_QTY) AS NET_CHANGE
                FROM {{ ref('SILVER', 'TRF_CONSUMPTION_DAILY') }} C
                WHERE NOT EXISTS (SELECT 1 FROM "JJ_DEV"."JJ_DEMO_GOLD"."FCT_RAW_INVENTORY_STOCK" R WHERE R.DATE_KEY = C.CONSUMPTION_DATE AND R.FRANCHISE_LOCATION_ID = C.FRANCHISE_LOCATION_ID AND R.INGREDIENT_SKU = C.INGREDIENT_SKU)
            ),

            -- 3. DENSE_SNAPSHOT: Creates the full matrix AND joins events in one CTE (Fix for scoping issue)
            DENSE_SNAPSHOT AS (
                SELECT
                    G.DATE_KEY,
                    L.FRANCHISE_LOCATION_ID,
                    I.INGREDIENT_SKU,
                    COALESCE(E.NET_CHANGE, 0) AS NET_CHANGE_FOR_DAY
                FROM DATE_GRID G
                -- CROSS JOIN the dimension tables to create the full grid
                CROSS JOIN {{ ref('GOLD', 'DIM_FRANCHISE_LOCATIONS') }} L
                CROSS JOIN {{ ref('GOLD', 'DIM_RAW_INGREDIENT') }} I
                -- LEFT JOIN the sparse event data to the dense grid
                LEFT JOIN DAILY_EVENTS E
                    ON G.DATE_KEY = E.DATE_KEY
                    AND L.FRANCHISE_LOCATION_ID = E.FRANCHISE_LOCATION_ID
                    AND I.INGREDIENT_SKU = E.INGREDIENT_SKU
            ),

            -- 4. RECURSIVE_INVENTORY_BALANCE (The Core Fix: Logic remains the same)
            RECURSIVE_INVENTORY_BALANCE (DATE_KEY, FRANCHISE_LOCATION_ID, INGREDIENT_SKU, ENDING_STOCK_QTY) AS (
                -- Anchor Member (Day 1)
                SELECT
                    DATE_KEY,
                    FRANCHISE_LOCATION_ID,
                    INGREDIENT_SKU,
                    NET_CHANGE_FOR_DAY AS ENDING_STOCK_QTY
                FROM DENSE_SNAPSHOT
                WHERE DATE_KEY = '2025-11-01'::DATE

                UNION ALL

                -- Recursive Member (Day N): Previous Day's End + Today's Net Change
                SELECT
                    T.DATE_KEY,
                    T.FRANCHISE_LOCATION_ID,
                    T.INGREDIENT_SKU,
                    R.ENDING_STOCK_QTY + T.NET_CHANGE_FOR_DAY AS ENDING_STOCK_QTY
                FROM DENSE_SNAPSHOT T
                INNER JOIN RECURSIVE_INVENTORY_BALANCE R
                    -- Join Today's data (T) to Yesterday's Result (R)
                    ON R.DATE_KEY = DATEADD(day, -1, T.DATE_KEY) 
                    AND T.FRANCHISE_LOCATION_ID = R.FRANCHISE_LOCATION_ID
                    AND T.INGREDIENT_SKU = R.INGREDIENT_SKU
                -- Ensure we process only dates after the anchor
                WHERE T.DATE_KEY > '2025-11-01'::DATE
            )

            -- 5. FINAL_OUTPUT: Select the calculated closing balance for every day
            SELECT
                RIB.DATE_KEY,
                RIB.FRANCHISE_LOCATION_ID,
                RIB.INGREDIENT_SKU,
                RIB.ENDING_STOCK_QTY
            FROM RECURSIVE_INVENTORY_BALANCE RIB
            ORDER BY RIB.DATE_KEY, RIB.FRANCHISE_LOCATION_ID, RIB.INGREDIENT_SKU
        dependencies:
          - locationName: GOLD
            nodeName: DIM_FRANCHISE_LOCATIONS
          - locationName: GOLD
            nodeName: DIM_RAW_INGREDIENT
          - locationName: GOLD
            nodeName: FCT_RAW_INVENTORY_STOCK
          - locationName: SILVER
