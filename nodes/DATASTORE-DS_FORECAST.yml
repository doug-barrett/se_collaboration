operation:
  config:
    postSQL: |-

      UPDATE {{this}} DS_FORECAST
      SET STATUS = 'Deleted', SYSTEM_UPDATE_TIME = CURRENT_TIMESTAMP
      WHERE DS_FORECAST.FORECAST_SUMMARY = 'SIGMA'
        AND DS_FORECAST.FORECAST_KEY NOT IN (SELECT DISTINCT FORECAST_KEY FROM {{ ref('STAGE', 'VW_FORECAST')}})
        AND DS_FORECAST.STATUS <> 'Deleted'
