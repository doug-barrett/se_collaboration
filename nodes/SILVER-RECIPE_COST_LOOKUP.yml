        dependencies:
          - locationName: GOLD
            nodeName: DIM_COST
          - locationName: GOLD
            nodeName: DIM_SUPPLIER
          - locationName: SILVER
            nodeName: DAILY_JOIN_GRID
          - locationName: SILVER
            nodeName: STG_RECIPE_NORMALIZED_T
        join:
          joinCondition: |-
            FROM {{ ref('SILVER', 'DAILY_JOIN_GRID') }} "DAILY_JOIN_GRID"

            -- A. Join to Recipe Version active on the DATE_KEY
                INNER JOIN {{ ref('SILVER', 'STG_RECIPE_NORMALIZED_T') }} RN
                    ON "DAILY_JOIN_GRID".ITEM_ID = RN.ITEM_ID
                    AND "DAILY_JOIN_GRID".DATE_KEY BETWEEN TO_DATE(RN.SYSTEM_START_DATE) AND TO_DATE(RN.SYSTEM_END_DATE)

            -- B. Join to Supplier Dimension to find the regional cost supplier
                INNER JOIN {{ ref('GOLD', 'DIM_SUPPLIER') }} DS
                    ON "DAILY_JOIN_GRID".REGION = DS.REGION -- Join by Region
                    AND "DAILY_JOIN_GRID".DATE_KEY BETWEEN TO_DATE(DS.SYSTEM_START_DATE) AND TO_DATE(DS.SYSTEM_END_DATE) -- Supplier history

            -- C. Join to Ingredient Cost Version active on the DATE_KEY
                INNER JOIN {{ ref('GOLD', 'DIM_COST') }} DC
                    ON DS.SUPPLIER_ID = DC.SUPPLIER_ID -- Join by Supplier Business Key
                    AND RN.INGREDIENT_SKU = DC.INGREDIENT_SKU
                    AND "DAILY_JOIN_GRID".DATE_KEY BETWEEN TO_DATE(DC.SYSTEM_START_DATE) AND TO_DATE(DC.SYSTEM_END_DATE) -- Cost history
                    
                -- Calculation: Total Cost for this ingredient = QTY_REQUIRED * COST_PER_UNIT
                WHERE RN.QTY_REQUIRED * DC.COST_PER_UNIT > 0
        name: RECIPE_COST_LOOKUP
        noLinkRefs: []
