    sourceMapping:
      - aliases:
          DIM_DATE: 2d9f453e-f432-4a19-a605-81709e23d574
          PRICE_COST_BASE: 72a0e5a7-a669-4c2e-810c-418edf46939a
          PRICE_COST_PROMO: 72a0e5a7-a669-4c2e-810c-418edf46939a
          STG_MEASURES_CURRENT_OPTIMIZE: 0241a2df-0401-4206-99e1-9082d21eb01b
          VW_EVENTS_REGION: 8338e9ae-510e-4c4a-8df6-84e64bf62b73
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: DATA
            nodeName: DIM_DATE
          - locationName: STAGE
            nodeName: VW_EVENTS_REGION
          - locationName: STAGE
            nodeName: VW_PRICE_COST_REGION
        join:
          joinCondition: |
            FROM {{ ref('STAGE', 'VW_EVENTS_REGION') }} "VW_EVENTS_REGION"
            JOIN {{ ref('DATA', 'DIM_DATE') }} DIM_DATE
            ON DIM_DATE."CALENDAR_DATE" = DATEADD(DAY,  (DATEDIFF(DAY, "VW_EVENTS_REGION"."EFFECTIVE_DATE", "VW_EVENTS_REGION"."END_DATE")+1) / 2, "VW_EVENTS_REGION"."EFFECTIVE_DATE")

            JOIN {{ ref('STAGE', 'VW_PRICE_COST_REGION') }} "PRICE_COST_BASE"
            ON "VW_EVENTS_REGION"."EFFECTIVE_DATE" - 1 BETWEEN "PRICE_COST_BASE"."PC_DT" AND "PRICE_COST_BASE"."PC_DT_END"
            AND "VW_EVENTS_REGION"."ZONE_GEOGRAPHY" = "PRICE_COST_BASE"."ZONE_GEOGRAPHY"
            AND "VW_EVENTS_REGION"."PRODKEY" = "PRICE_COST_BASE"."PRODKEY"

            JOIN {{ ref('STAGE', 'VW_PRICE_COST_REGION') }} "PRICE_COST_PROMO"
            ON "VW_EVENTS_REGION"."EFFECTIVE_DATE" BETWEEN "PRICE_COST_PROMO"."PC_DT" AND "PRICE_COST_PROMO"."PC_DT_END"
            AND "VW_EVENTS_REGION"."ZONE_GEOGRAPHY" = "PRICE_COST_PROMO"."ZONE_GEOGRAPHY"
            AND "VW_EVENTS_REGION"."PRODKEY" = "PRICE_COST_PROMO"."PRODKEY"

            LEFT JOIN {{ ref_no_link('STAGE', 'STG_MEASURES_CURRENT_OPTIMIZE') }} "STG_MEASURES_CURRENT_OPTIMIZE"
            ON "VW_EVENTS_REGION"."ZONE_GEOGRAPHY" = STG_MEASURES_CURRENT_OPTIMIZE."ZONE_GEOGRAPHY"
            AND "VW_EVENTS_REGION"."PRODKEY" = "STG_MEASURES_CURRENT_OPTIMIZE"."PRODKEY"
            AND ROUND(DIV0(("VW_EVENTS_REGION"."NOW_PRICE" - "VW_EVENTS_REGION"."WAS_PRICE") , "VW_EVENTS_REGION"."WAS_PRICE") * -100, -1) = "STG_MEASURES_CURRENT_OPTIMIZE".DISCOUNT_BUCKET
            AND NVL(DIM_DATE."HOLIDAY_NAME", 'NO_HOLIDAY') = "STG_MEASURES_CURRENT_OPTIMIZE".HOLIDAY_NAME

            WHERE "VW_EVENTS_REGION"."ZONE_CODE" IN (1, 4)
            AND "VW_EVENTS_REGION"."EFFECTIVE_DATE" < CURRENT_DATE
            AND FORECAST_KEY NOT IN (SELECT FORECAST_KEY FROM {{ ref_no_link('DATASTORE','DS_FORECAST')}} )
