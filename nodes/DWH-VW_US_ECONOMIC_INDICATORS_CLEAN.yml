    sourceMapping:
      - aliases:
          VW_US_ECONOMIC_INDICATORS: 43698d70-a460-4be2-9f30-b8740ebff87e
        customSQL:
          customSQL: |-
            {{ stage('Override Create SQL') }}
            	CREATE OR REPLACE VIEW JJ_DEV.JJ_DEV_SCHEMA.VW_US_ECONOMIC_INDICATORS_CLEAN AS
            WITH parsed_data AS (
                SELECT 
                    CLASS_NAME,
                    INDICATOR_NAME,
                    DEFINITION,
                    PARENT_CLASSES,
                    ABBREVIATION
                FROM {{ ref('DWH', 'VW_US_ECONOMIC_INDICATORS') }}
                WHERE CLASS_NAME IS NOT NULL
            ),
            -- Extract labels from INDICATOR_NAME
            labels_extracted AS (
                SELECT 
                    pd.CLASS_NAME,
                    label_elem.value:"$"::STRING AS EXTRACTED_LABEL
                FROM parsed_data pd,
                    LATERAL FLATTEN(input => TRY_PARSE_JSON(pd.INDICATOR_NAME), OUTER => TRUE) label_elem
                WHERE label_elem.value:"@"::STRING = 'rdfs:label'
            ),
            -- Extract definitions from DEFINITION
            definitions_extracted AS (
                SELECT 
                    pd.CLASS_NAME,
                    def_elem.value:"$"::STRING AS EXTRACTED_DEFINITION
                FROM parsed_data pd,
                    LATERAL FLATTEN(input => TRY_PARSE_JSON(pd.DEFINITION), OUTER => TRUE) def_elem
                WHERE def_elem.value:"@"::STRING = 'skos:definition'
            ),
            -- Extract examples from DEFINITION
            examples_extracted AS (
                SELECT 
                    pd.CLASS_NAME,
                    ex_elem.value:"$"::STRING AS EXTRACTED_EXAMPLE
                FROM parsed_data pd,
                    LATERAL FLATTEN(input => TRY_PARSE_JSON(pd.DEFINITION), OUTER => TRUE) ex_elem
                WHERE ex_elem.value:"@"::STRING = 'skos:example'
            ),
            -- Extract abbreviations from DEFINITION or INDICATOR_NAME
            abbreviations_extracted AS (
                SELECT 
                    pd.CLASS_NAME,
                    abbr_elem.value:"$"::STRING AS EXTRACTED_ABBREVIATION
                FROM parsed_data pd,
                    LATERAL FLATTEN(input => TRY_PARSE_JSON(pd.DEFINITION), OUTER => TRUE) abbr_elem
                WHERE abbr_elem.value:"@"::STRING = 'cmns-av:abbreviation'
                
                UNION ALL
                
                SELECT 
                    pd.CLASS_NAME,
                    abbr_elem.value:"$"::STRING AS EXTRACTED_ABBREVIATION
                FROM parsed_data pd,
                    LATERAL FLATTEN(input => TRY_PARSE_JSON(pd.INDICATOR_NAME), OUTER => TRUE) abbr_elem
                WHERE abbr_elem.value:"@"::STRING = 'cmns-av:abbreviation'
            ),
            -- Extract parent classes
            parents_extracted AS (
                SELECT 
                    pd.CLASS_NAME,
                    parent_elem.value:"@rdf:resource"::STRING AS PARENT_CLASS_URI
                FROM parsed_data pd,
                    LATERAL FLATTEN(input => TRY_PARSE_JSON(pd.DEFINITION), OUTER => TRUE) parent_elem
                WHERE parent_elem.value:"@"::STRING = 'rdfs:subClassOf'
                
                UNION ALL
                
                SELECT 
                    pd.CLASS_NAME,
                    parent_elem.value:"@rdf:resource"::STRING AS PARENT_CLASS_URI
                FROM parsed_data pd,
                    LATERAL FLATTEN(input => TRY_PARSE_JSON(pd.INDICATOR_NAME), OUTER => TRUE) parent_elem
                WHERE parent_elem.value:"@"::STRING = 'rdfs:subClassOf'
            ),
            -- Extract adapted from references
            adaptedfrom_extracted AS (
                SELECT 
                    pd.CLASS_NAME,
                    ref_elem.value:"@rdf:resource"::STRING AS ADAPTED_FROM_URI
                FROM parsed_data pd,
                    LATERAL FLATTEN(input => TRY_PARSE_JSON(pd.DEFINITION), OUTER => TRUE) ref_elem
                WHERE ref_elem.value:"@"::STRING = 'cmns-av:adaptedFrom'
            )
            SELECT DISTINCT
                pd.CLASS_NAME,
                le.EXTRACTED_LABEL AS INDICATOR_NAME,
                de.EXTRACTED_DEFINITION AS DEFINITION,
                ee.EXTRACTED_EXAMPLE AS EXAMPLE,
                ae.EXTRACTED_ABBREVIATION AS ABBREVIATION,
                JJ_DEV.JJ_DEV_SCHEMA.GET_LOCAL_NAME(pe.PARENT_CLASS_URI) AS PARENT_CLASS,
                pe.PARENT_CLASS_URI,
                afe.ADAPTED_FROM_URI
            FROM parsed_data pd
            LEFT JOIN labels_extracted le ON pd.CLASS_NAME = le.CLASS_NAME
            LEFT JOIN definitions_extracted de ON pd.CLASS_NAME = de.CLASS_NAME
            LEFT JOIN examples_extracted ee ON pd.CLASS_NAME = ee.CLASS_NAME
            LEFT JOIN abbreviations_extracted ae ON pd.CLASS_NAME = ae.CLASS_NAME
            LEFT JOIN parents_extracted pe ON pd.CLASS_NAME = pe.CLASS_NAME
            LEFT JOIN adaptedfrom_extracted afe ON pd.CLASS_NAME = afe.CLASS_NAME
            WHERE le.EXTRACTED_LABEL IS NOT NULL OR de.EXTRACTED_DEFINITION IS NOT NULL
            ORDER BY pd.CLASS_NAME
        dependencies:
          - locationName: DWH
            nodeName: VW_US_ECONOMIC_INDICATORS
        join:
          joinCondition: FROM {{ ref('DWH', 'VW_US_ECONOMIC_INDICATORS') }} "VW_US_ECONOMIC_INDICATORS"
        name: VW_US_ECONOMIC_INDICATORS_CLEAN
        noLinkRefs: []
