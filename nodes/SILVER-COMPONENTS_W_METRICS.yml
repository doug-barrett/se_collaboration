        join:
          joinCondition: |-
            FROM {{ ref('SILVER', 'STG_FINAL_COMPONENTS') }} "STG_FINAL_COMPONENTS"
            -- Look up Consumption
                LEFT JOIN {{ ref('SILVER', 'TRF_CONSUMPTION_DAILY') }} D 
                    ON "STG_FINAL_COMPONENTS".DATE_KEY = D.CONSUMPTION_DATE AND "STG_FINAL_COMPONENTS".FRANCHISE_LOCATION_ID = D.FRANCHISE_LOCATION_ID AND "STG_FINAL_COMPONENTS".INGREDIENT_SKU = D.INGREDIENT_SKU
                -- Look up Received Stock
                LEFT JOIN {{ ref('GOLD', 'FCT_RAW_INVENTORY_STOCK') }} R 
                    ON "STG_FINAL_COMPONENTS".DATE_KEY = R.DATE_KEY AND "STG_FINAL_COMPONENTS".FRANCHISE_LOCATION_ID = R.FRANCHISE_LOCATION_ID AND "STG_FINAL_COMPONENTS".INGREDIENT_SKU = R.INGREDIENT_SKU
