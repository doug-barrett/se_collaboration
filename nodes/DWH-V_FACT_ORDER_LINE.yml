        dependencies:
          - locationName: DWH
            nodeName: DIM_TRUCK
          - locationName: DWH
            nodeName: FACT_ORDER_LINE
          - locationName: DWH
            nodeName: STG_ORDER_HEADER_CLEAN
        join:
          joinCondition: |-
            FROM {{ ref('DWH', 'FACT_ORDER_LINE') }} f
            JOIN {{ ref('DWH', 'STG_ORDER_HEADER_CLEAN') }} h
              ON f.ORDER_ID = h.ORDER_ID
            LEFT JOIN {{ ref('DWH', 'DIM_TRUCK') }} t
              ON f.TRUCK_ID = t.TRUCK_ID
              AND NVL(t.SYSTEM_CURRENT_FLAG,'Y') IN ('Y','1','TRUE')

              GROUP BY
              f.TRUCK_ID,
              t.MAKE,
              t.MODEL,
              t.PRIMARY_CITY,
              t.REGION,
              t.COUNTRY,
              CASE
                WHEN EXTRACT(HOUR FROM h.ORDER_DATE) BETWEEN 5  AND 10 THEN 'Breakfast'
                WHEN EXTRACT(HOUR FROM h.ORDER_DATE) BETWEEN 11 AND 14 THEN 'Lunch'
                WHEN EXTRACT(HOUR FROM h.ORDER_DATE) BETWEEN 15 AND 17 THEN 'Afternoon'
                WHEN EXTRACT(HOUR FROM h.ORDER_DATE) BETWEEN 18 AND 21 THEN 'Dinner'
                ELSE 'Late Night'
              END
            ORDER BY TOTAL_REVENUE DESC
