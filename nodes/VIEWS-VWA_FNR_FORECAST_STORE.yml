            AND "FCT_FNR_FORECAST"."FNR_DATE" = "VW_FORECAST_DAY"."TRANSACTION_DATE"
            LEFT JOIN {{ ref('DATASTORE', 'DS_FORECAST') }} "DS_FORECAST"
            ON "VW_FORECAST_DAY"."FORECAST_KEY" = "DS_FORECAST"."FORECAST_KEY"

            WHERE "FCT_FNR_FORECAST"."FNR_DATE" BETWEEN CURRENT_DATE AND CURRENT_DATE + 30
