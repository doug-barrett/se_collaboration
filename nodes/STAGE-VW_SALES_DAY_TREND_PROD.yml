        join:
          joinCondition: |-
            FROM {{ ref('DATA', 'DIM_DATE') }} "DIM_DATE"

            INNER JOIN {{ ref('STAGE', 'STG_FORECAST_PROFILE') }} "STG_FORECAST_PROFILE"
            ON  NVL("DIM_DATE"."HOLIDAY_NAME",'NO_HOLIDAY') = "STG_FORECAST_PROFILE"."PERIOD_NAME"
            AND NVL("DIM_DATE"."DAYS_FROM_HOLIDAY", DIM_DATE."CAL_DAY_IN_WEEK_NO") = "STG_FORECAST_PROFILE"."DAY_NO"

            INNER JOIN {{ ref('STAGE', 'VW_SALES_L3_HOLIDAY') }} "VW_SALES_L3_HOLIDAY"
            ON STG_FORECAST_PROFILE."PERIOD_NAME" = "VW_SALES_L3_HOLIDAY"."HOLIDAY_NAME"
            AND "STG_FORECAST_PROFILE"."ZONE_GEOGRAPHY" = "VW_SALES_L3_HOLIDAY"."ZONE_GEOGRAPHY"
            AND "STG_FORECAST_PROFILE"."LEVEL3_DESC" = "VW_SALES_L3_HOLIDAY"."LEVEL3_DESC"

            INNER JOIN {{ ref('STAGE', 'STG_MEASURES_CURRENT') }} "STG_MEASURES_CURRENT"
            ON "STG_FORECAST_PROFILE"."ZONE_GEOGRAPHY" = "STG_MEASURES_CURRENT"."ZONE_GEOGRAPHY"
            AND "STG_FORECAST_PROFILE"."LEVEL3_DESC" = "STG_MEASURES_CURRENT"."LEVEL3_DESC"

            WHERE "DIM_DATE"."CALENDAR_DATE" BETWEEN DATEADD(YEAR, -1, CURRENT_DATE) AND DATEADD(YEAR, 1, CURRENT_DATE)
