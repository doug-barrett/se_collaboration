          - locationName: REFERENCE
            nodeName: REF_CAMPAIGN
        join:
          joinCondition: |-
            FROM {{ ref('REFERENCE', 'REF_CAMPAIGN') }} "REF_CAMPAIGN"
            INNER JOIN {{ ref('DATA', 'FCT_SALES_DAY') }} "FCT_SALES_DAY"
            ON "FCT_SALES_DAY"."TRANSACTION_DATE" BETWEEN "REF_CAMPAIGN"."DEAL_START_DATE" AND "REF_CAMPAIGN"."DEAL_END_DATE"
            INNER JOIN {{ ref('DATA', 'DIM_EVENTS_REGION')}} "DIM_EVENTS_REGION"
            ON "FCT_SALES_DAY"."DIM_EVENTS_REGION_KEY" = "DIM_EVENTS_REGION"."DIM_EVENTS_REGION_KEY"
            WHERE (CURRENT_DATE BETWEEN "REF_CAMPAIGN"."DEAL_START_DATE" AND "REF_CAMPAIGN"."DEAL_END_DATE" + 5
               OR "REF_CAMPAIGN"."DEAL_KEY" NOT IN (SELECT DISTINCT DEAL_KEY FROM {{ ref_no_link('DATA', 'FCT_SALES_CAMPAIGN') }}))
               AND DIM_EVENTS_REGION."EVENT_TYPE" = 'EVENT'
            GROUP BY 1, 2
